name: Deploy Client App to S3

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get secrets
        id: secrets
        run: |
          API_GATEWAY_URL=$(aws secretsmanager get-secret-value --secret-id pack-pixie/api-gateway-url --query SecretString --output text)
          COGNITO_USER_POOL_ID=$(aws secretsmanager get-secret-value --secret-id pack-pixie/cognito-user-pool-id --query SecretString --output text)
          COGNITO_USER_POOL_CLIENT_ID=$(aws secretsmanager get-secret-value --secret-id pack-pixie/cognito-user-pool-client-id --query SecretString --output text)
          BUCKET_NAME=$(aws secretsmanager get-secret-value --secret-id pack-pixie/s3-bucket-client --query SecretString --output text)
          echo "api_gateway_url=$API_GATEWAY_URL" >> $GITHUB_OUTPUT
          echo "cognito_user_pool_id=$COGNITO_USER_POOL_ID" >> $GITHUB_OUTPUT
          echo "cognito_user_pool_client_id=$COGNITO_USER_POOL_CLIENT_ID" >> $GITHUB_OUTPUT
          echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT

      - name: Build application
        run: pnpm turbo run build --filter=client
        env:
          VITE_API_URL: ${{ steps.secrets.outputs.api_gateway_url }}
          VITE_COGNITO_USER_POOL_ID: ${{ steps.secrets.outputs.cognito_user_pool_id }}
          VITE_COGNITO_USER_POOL_CLIENT_ID: ${{ steps.secrets.outputs.cognito_user_pool_client_id }}

      - name: Deploy to S3
        run: |
          aws s3 sync apps/client/dist/ s3://${{ steps.secrets.outputs.bucket_name }} --delete
          aws s3 cp apps/client/dist/index.html s3://${{ steps.secrets.outputs.bucket_name }}/index.html --cache-control "no-cache"
